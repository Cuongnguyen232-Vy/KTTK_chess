<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng xếp hạng - Cường đẹp traii</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-brand">
        <span class="logo-icon">♟</span>
        <span>Cường đẹp traii</span>
    </div>
    <div class="nav-actions">
        <a href="javascript:history.back()" class="btn btn-ghost">← Quay lại</a>
    </div>
</nav>

<div class="main-container">
    <div class="page-header ranking-header">
        <h2>🏆 Bảng xếp hạng</h2>
        <p>Xếp hạng theo điểm ELO giảm dần</p>
    </div>

    <!-- Top 3 podium -->
    <div class="podium" th:if="${players.size() >= 3}">
        <!-- Hạng 2 -->
        <div class="podium-item podium-2" th:if="${players.size() > 1}">
            <div class="podium-avatar">
                <span th:text="${#strings.substring(players[1].fullName ?: players[1].userName, 0, 1).toUpperCase()}">B</span>
            </div>
            <div class="podium-name" th:text="${players[1].fullName} ?: ${players[1].userName}">Player 2</div>
            <div class="podium-elo" th:text="${players[1].eloPoint}">1487</div>
            <div class="podium-rank rank-2">🥈</div>
        </div>
        <!-- Hạng 1 -->
        <div class="podium-item podium-1">
            <div class="podium-avatar podium-crown">
                <span th:text="${#strings.substring(players[0].fullName ?: players[0].userName, 0, 1).toUpperCase()}">A</span>
            </div>
            <div class="podium-name" th:text="${players[0].fullName} ?: ${players[0].userName}">Player 1</div>
            <div class="podium-elo" th:text="${players[0].eloPoint}">2000</div>
            <div class="podium-rank rank-1">🥇</div>
        </div>
        <!-- Hạng 3 -->
        <div class="podium-item podium-3" th:if="${players.size() > 2}">
            <div class="podium-avatar">
                <span th:text="${#strings.substring(players[2].fullName ?: players[2].userName, 0, 1).toUpperCase()}">C</span>
            </div>
            <div class="podium-name" th:text="${players[2].fullName} ?: ${players[2].userName}">Player 3</div>
            <div class="podium-elo" th:text="${players[2].eloPoint}">1650</div>
            <div class="podium-rank rank-3">🥉</div>
        </div>
    </div>

    <!-- Bảng xếp hạng đầy đủ -->
    <div class="table-card">
        <table class="data-table ranking-table">
            <thead>
                    <th>STT</th>
                    <th style="text-align:left;">TÊN</th>
                    <th>THẮNG</th>
                    <th>THUA</th>
                    <th>HÒA</th>
                    <th>ELO</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="player, iterStat : ${players}"
                    th:class="${iterStat.index < 3} ? 'top-row clickable-row' : 'clickable-row'"
                    th:attr="onclick=|window.location.href='/profile/' + '${player.userName}'|">
                    <td class="rank-cell">
                        <span th:if="${iterStat.index == 0}" style="color:#f59e0b; font-weight:bold;">1</span>
                        <span th:if="${iterStat.index == 1}" style="color:#e2e8f0; font-weight:bold;">2</span>
                        <span th:if="${iterStat.index == 2}" style="color:#d97706; font-weight:bold;">3</span>
                        <span th:if="${iterStat.index >= 3}" th:text="${iterStat.index + 1}">4</span>
                    </td>
                    <td>
                        <div style="display:flex; align-items:center; gap:0.5rem; justify-content:flex-start;">
                            <div class="podium-avatar" style="width:32px; height:32px; font-size:1rem; flex-shrink:0;">
                                <span th:text="${#strings.substring(player.fullName ?: player.userName, 0, 1).toUpperCase()}">A</span>
                            </div>
                            <span th:text="${player.fullName} ?: ${player.userName}">Nguyễn Văn A</span>
                        </div>
                    </td>
                    <td th:text="${player.winCount}" style="color:#10b981;">0</td>
                    <td th:text="${player.lossCount}">0</td>
                    <td th:text="${player.drawCount}">0</td>
                    <td>
                        <span class="elo-badge" th:text="${player.eloPoint}">1513</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</div>

<style>
    .clickable-row {
        cursor: pointer;
        transition: background-color 0.2s ease;
    }
    .clickable-row:hover {
        background-color: #334155 !important;
    }
</style>

</body>
</html>
