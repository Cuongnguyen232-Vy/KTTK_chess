<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Cường đẹp traii</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-card dashboard-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">♟</div>
            <h1 class="brand-name">Cường đẹp traii</h1>
        </div>

        <!-- Chào mừng -->
        <div class="welcome-badge">
            🎉
            <span>Chào mừng &nbsp;</span>
            <span class="badge-name" th:text="${account?.fullName} ?: ${account?.userName}">Admin</span>
        </div>

        <div class="dashboard-actions">
            <a th:href="@{/admin/accounts}" class="btn btn-primary btn-full btn-icon">
                👥 Quản lý người chơi
            </a>
            <a th:href="@{/ranking}" class="btn btn-secondary btn-full btn-icon">
                🏆 Bảng xếp hạng
            </a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline btn-full btn-icon">
                    🚪 Đăng xuất
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
