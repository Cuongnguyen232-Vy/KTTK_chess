# =============================================
# Application
# =============================================
spring.application.name=chess-game
server.port=8080

# =============================================
# MySQL Database
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/chess_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# =============================================
# Logging
# =============================================
logging.level.com.chess=DEBUG
